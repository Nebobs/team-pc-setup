
- name: Setup workstation
  hosts: workstations
  become: yes

  vars:
    developer_user: devuser
    venv_path: "/home/devuser/.virtualenvs/team_venv"

  tasks:
    - name: Add repository
      apt_repository:
        repo: "ppa:deadsnakes/ppa"
        state: present
        update_cache: yes
          
    - name: Install packages
      apt:
        name: "{{ item }}"
        state: present
      loop:
        - python3
        - python3-pip 
        - python3-venv
        - virtualenvwrapper
        - git
        - curl
        - htop
        - acl
    
    - name: Copy certificate
      copy:
        src: files/team-dummy-ca.crt
        dest: /usr/local/share/ca-certificates/team-dummy-ca.crt
      notify: update ca certificates

    - name: Create user
      user:        
        name: "{{ developer_user }}"
        groups: sudo
        append: yes
        create_home: yes

    - name: Add virtualenvwrapper config
      blockinfile:
        path: "/home/{{ developer_user }}/.bashrc"
        block: |
          export WORKON_HOME=$HOME/.virtualenvs
          source /usr/share/virtualenvwrapper/virtualenvwrapper.sh
        create: yes
        owner: "{{ developer_user }}"
        group: "{{ developer_user }}"
        mode: '0644'

    - name: Create virtualenv folder
      file:
        path: "/home/{{ developer_user }}/.virtualenvs"
        state: directory
        owner: "{{ developer_user }}"
        group: "{{ developer_user }}"
        mode: '0755'

    - name: Create virtualenv using virtualenvwrapper
      shell: bash -ic "mkvirtualenv team_venv"
      args:
        creates: "{{ venv_path }}"
      become: yes
      become_user: "{{ developer_user }}"



    - name: Install rpyc inside virtualenv
      pip: 
        name: rpyc
        virtualenv: "{{ venv_path }}" 
      become_user: "{{ developer_user }}"

                        
    - name: Copy MOTD
      copy: 
        src: files/custom-motd
        dest: /etc/motd

  handlers:
    - name: update ca certificates
      command: update-ca-certificates

